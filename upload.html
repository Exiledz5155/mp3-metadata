<!DOCTYPE html>
<html>
<head>
  <title>MP3 Metadata Editor</title>
  <style>
    /* Style to hide the default file input field */
    input[type="file"] {
      display: none;
    }

    /* Style for the custom button */
    .custom-button {
      background-color: #0074D9; /* Change the background color as needed */
      color: #fff; /* Change the text color as needed */
      padding: 10px 20px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Upload an MP3 File</h1>
  <form action="/upload" method="post" enctype="multipart/form-data">
    <label for="mp3file" class="custom-button">
      Select an MP3 file
    </label>
    <input type="file" name="mp3file" id="mp3file" accept=".mp3" required>
    <br>
    <button type="submit">Upload</button>
  </form>
</body>
</html>

<!-- 
When the user submits the form (upload), it will trigger a POST request to the /upload route of our Express.js application.
In the Express.js->app.js file, we have a route handler for the /upload route that specifies how to handle the file upload.
The server-side route handler will process the uploaded file and metadata, and it may respond to the request accordingly. -->
